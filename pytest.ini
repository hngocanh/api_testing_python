[pytest]

# --- Test Discovery ---
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# --- Python Path ---
pythonpath = .

# --- Default CLI options (run automatically every time) ---
addopts =
    -v
    --tb=short
    --html=reports/report.html
    --self-contained-html

# --- Custom Markers ---
markers =
    smoke: Quick sanity checks — run these first
    regression: Full regression suite
    public: Tests for the public API tier
    auth: Tests for the authenticated API tier
    get: Tests for GET endpoints
    post: Tests for POST endpoints
    put: Tests for PUT endpoints
    patch: Tests for PATCH endpoints
    delete: Tests for DELETE endpoints

# --- Timeouts (requires pytest-timeout) ---
timeout = 30

# --- Logging ---
log_cli = true
log_cli_level = INFO
log_date_format = %Y-%m-%d %H:%M:%S
log_format = %(asctime)s [%(levelname)s] %(message)s